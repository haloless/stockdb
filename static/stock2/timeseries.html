<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时序分析</title>
    <link rel="stylesheet" href="/stock2/css/main.css">
</head>
<body>
<div class="container">
    <div class="topbar">
        <h1>时序分析</h1>
        <a href="/stock2/index.html">返回首页</a>
    </div>

    <div class="panel filters">
        <div>
            <label for="tsSymbolsInput">股票代码（逗号分隔）</label>
            <input id="tsSymbolsInput" type="text" placeholder="如 600545,002516">
        </div>
        <div>
            <label for="tsIndustriesSelect">行业（可多选）</label>
            <input id="tsIndustrySearch" type="text" placeholder="搜索行业关键字">
            <select id="tsIndustriesSelect" multiple size="6"></select>
        </div>
        <div>
            <label for="tsStartDate">开始日期</label>
            <input id="tsStartDate" type="date">
        </div>
        <div>
            <label for="tsEndDate">结束日期</label>
            <input id="tsEndDate" type="date">
        </div>
        <div>
            <label for="windowInput">滚动窗口（日）</label>
            <input id="windowInput" type="number" min="1" value="1">
        </div>
        <div>
            <label>筛选选项</label>
            <div style="margin-left: 10px;">
                <div style="margin-bottom: 8px; display: flex; align-items: center;">
                    <label class="inline-check" for="sortOrderCheck" style="margin-right: 8px;">
                        <input id="sortOrderCheck" type="checkbox" checked>
                    </label>
                    <label for="sortOrder">排序方式</label>
                    <select id="sortOrder" style="margin-left: 8px;">
                        <option value="">不排序</option>
                        <option value="asc">从低到高</option>
                        <option value="desc">从高到低</option>
                    </select>
                </div>
                <div style="margin-bottom: 8px; display: flex; align-items: center;">
                    <label class="inline-check" for="limitCountCheck" style="margin-right: 8px;">
                        <input id="limitCountCheck" type="checkbox" checked>
                    </label>
                    <label for="limitCount">显示数量(N)</label>
                    <input id="limitCount" type="number" min="1" value="30" style="margin-left: 8px; width: 60px;">
                </div>
                <div style="margin-bottom: 8px; display: flex; align-items: center;">
                    <label class="inline-check" for="positiveDaysCheck" style="margin-right: 8px;">
                        <input id="positiveDaysCheck" type="checkbox" checked>
                    </label>
                    <label for="positiveDays">连续净流入天数(N)</label>
                    <input id="positiveDays" type="number" min="1" value="3" style="margin-left: 8px; width: 60px;">
                </div>
            </div>
        </div>
        <div>
            <label>主展示指标</label>
            <div id="metricCheckboxes" style="margin-left: 20px;">
                <label class="inline-check" for="metric_net_inflow" style="display: block; margin-bottom: 5px;">
                    <input id="metric_net_inflow" type="checkbox" value="net_inflow_100m" checked disabled>
                    净流入(亿元)
                </label>
                <label class="inline-check" for="metric_relative_flow" style="display: block; margin-bottom: 5px;">
                    <input id="metric_relative_flow" type="checkbox" value="relative_flow_pct">
                    相对流量%
                </label>
                <label class="inline-check" for="metric_large_flow" style="display: block; margin-bottom: 5px;">
                    <input id="metric_large_flow" type="checkbox" value="large_flow_pct">
                    大宗流量%
                </label>
                <label class="inline-check" for="metric_turnover" style="display: block; margin-bottom: 5px;">
                    <input id="metric_turnover" type="checkbox" value="turnover_amount_100m">
                    成交额(亿元)
                </label>
                <label class="inline-check" for="metric_inflow" style="display: block; margin-bottom: 5px;">
                    <input id="metric_inflow" type="checkbox" value="inflow_amount_100m">
                    流入额(亿元)
                </label>
                <label class="inline-check" for="metric_outflow" style="display: block; margin-bottom: 5px;">
                    <input id="metric_outflow" type="checkbox" value="outflow_amount_100m">
                    流出额(亿元)
                </label>
                <label class="inline-check" for="metric_volume" style="display: block;">
                    <input id="metric_volume" type="checkbox" value="trade_volume_100m">
                    成交量(亿股)
                </label>
            </div>
        </div>
        <div>
            <label for="cumulativeToggle">图表模式</label>
            <label class="inline-check" for="cumulativeToggle">
                <input id="cumulativeToggle" type="checkbox" checked>
                显示累计曲线
            </label>
        </div>
        <div>
            <label for="relativeValueToggle">相对值</label>
            <label class="inline-check" for="relativeValueToggle">
                <input id="relativeValueToggle" type="checkbox" checked>
                相对于流通市值
            </label>
        </div>
        <div>
            <button id="tsBtn" type="button">生成图表</button>
        </div>
    </div>

    <div class="panel">
        <h2>趋势图</h2>
        <div id="chart" class="chart-box"></div>
        <div class="chart-actions">
            <button id="exportCsvBtn" type="button">导出文件</button>
        </div>
    </div>

    <div class="panel">
        <h2>明细结果（前200行）</h2>
        <div class="table-wrap">
            <table id="timeseriesTable">
                <thead></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
<script src="/static/js/plotly-latest.min.js"></script>
<script src="/stock2/js/main.js"></script>
<script>
    window.Stock2.initTimeseriesPage();
</script>
</body>
</html>
